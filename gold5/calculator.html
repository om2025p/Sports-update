<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>محاسبه تغییرات درصد · صندوق سینرژی (نفت، گاز، برق)</title>
    <style>
        :root {
            --bg-body: #f0f4f8;
            --bg-container: #ffffff;
            --text-primary: #333333;
            --text-secondary: #555555;
            --primary-color: #1976d2;
            --primary-hover: #1565c0;
            --border-color: #bbdefb;
            --section-bg: #f5faff;
            --input-bg: #ffffff;
            --input-border: #90caf9;
            --input-text: #333333;
            --btn-copy-bg: #e3f2fd;
            --btn-copy-hover: #bbdefb;
            --btn-copy-text: #1565c0;
            --result-bg: #e3f2fd;
            --result-text: #0d47a1;
            --positive-color: #2e7d32;
            --negative-color: #c62828;
            --neutral-color: #1976d2;
            --shadow-color: rgba(25, 118, 210, 0.15);
            --history-bg: #ffffff;
            --history-item-hover: #e3f2fd;
            --history-border: #bbdefb;
            --toast-bg: #1976d2;
            --toast-color: #ffffff;
        }

        [data-theme="dark"] {
            --bg-body: #0d1117;
            --bg-container: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --primary-color: #448aff;
            --primary-hover: #82b1ff;
            --border-color: #30363d;
            --section-bg: #21262d;
            --input-bg: #0d1117;
            --input-border: #30363d;
            --input-text: #e6edf3;
            --btn-copy-bg: #21262d;
            --btn-copy-hover: #30363d;
            --btn-copy-text: #58a6ff;
            --result-bg: #1f2937;
            --result-text: #e6edf3;
            --positive-color: #4caf50;
            --negative-color: #ff5252;
            --neutral-color: #64b5f6;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --history-bg: #161b22;
            --history-item-hover: #1f2937;
            --history-border: #30363d;
            --toast-bg: #448aff;
            --toast-color: #ffffff;
        }

        body {
            font-family: Tahoma, 'Segoe UI', Arial, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            background-color: var(--bg-container);
            border-radius: 16px;
            box-shadow: 0 8px 24px var(--shadow-color);
            padding: 30px;
            width: 85%;
            max-width: 720px;
            position: relative;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-primary);
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        .theme-toggle:hover {
            background-color: var(--btn-copy-bg);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            margin-top: 10px;
            font-weight: 800;
            font-size: 1.3rem;
        }

        .calculator-section {
            margin-bottom: 25px;
            padding: 25px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--section-bg);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            display: inline-block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1.1em;
            color: var(--input-text);
            background-color: var(--input-bg);
            flex-grow: 1;
            transition: all 0.3s ease;
            font-family: monospace;
            direction: ltr;
            text-align: left;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--shadow-color);
        }

        .copy-btn {
            background-color: var(--btn-copy-bg);
            color: var(--btn-copy-text);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            min-width: 48px;
        }

        .copy-btn:hover {
            background-color: var(--btn-copy-hover);
        }

        .copy-btn:active {
            transform: translateY(1px);
        }

        .copy-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .calc-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            font-family: inherit;
            width: 100%;
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .calc-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);
        }

        .calc-btn:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 20px;
            display: flex;
            align-items: stretch;
            gap: 10px;
        }

        .result {
            flex-grow: 1;
            padding: 15px;
            background-color: var(--result-bg);
            color: var(--result-text);
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            min-height: 24px;
            display: flex;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .positive {
            color: var(--positive-color);
            background-color: rgba(46, 125, 50, 0.1);
            border-color: var(--positive-color);
        }

        .negative {
            color: var(--negative-color);
            background-color: rgba(198, 40, 40, 0.1);
            border-color: var(--negative-color);
        }

        .neutral {
            color: var(--neutral-color);
        }

        /* استایل تاریخچه */
        .history-section {
            position: relative;
            margin-top: 10px;
        }

        .history-dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .history-btn {
            background-color: var(--primary-color);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-btn:hover {
            background-color: var(--primary-hover);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--history-bg);
            min-width: 100%;
            max-height: 380px;
            overflow-y: auto;
            box-shadow: 0 8px 24px var(--shadow-color);
            border-radius: 12px;
            z-index: 1000;
            margin-top: 10px;
            border: 1px solid var(--history-border);
        }

        .history-section.show .dropdown-content {
            display: block;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid var(--history-border);
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .history-item:hover {
            background-color: var(--history-item-hover);
        }

        .history-item .copyable-number,
        .history-item .copyable-percent,
        .history-item .copyable-full {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 12px;
            transition: background 0.1s;
        }

        .history-item .copyable-number:active,
        .history-item .copyable-percent:active {
            background-color: var(--primary-color);
            color: white;
            transform: scale(0.98);
        }

        .history-item .date {
            color: var(--primary-color);
            font-size: 0.7rem;
            direction: ltr;
            display: inline-block;
            background: var(--btn-copy-bg);
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 6px;
        }

        .history-item .details {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 0.85rem;
            margin: 5px 0;
            direction: ltr;
            text-align: left;
        }

        .clear-history {
            background-color: #f44336;
            margin-top: 12px;
            width: 100%;
        }

        .clear-history:hover {
            background-color: #d32f2f;
        }

        .badge {
            background: #ff9800;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.7rem;
            margin-right: 8px;
            color: #1a1a1a;
            font-weight: bold;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--toast-color);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            font-weight: bold;
        }

        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: "کپی شد!";
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--toast-bg);
            color: var(--toast-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, bottom 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
        }

        .tooltip.show-tooltip::after {
            opacity: 1;
            visibility: visible;
            bottom: 135%;
        }

        .dropdown-content::-webkit-scrollbar {
            width: 6px;
        }
        .dropdown-content::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 10px;
        }
        .dropdown-content::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .container {
                width: 95%;
                padding: 20px;
                padding-top: 60px;
            }
            h1 {
                font-size: 1.2rem;
                margin-bottom: 20px;
            }
            .calculator-section {
                padding: 15px;
                margin-bottom: 20px;
            }
            h2 {
                font-size: 1.1em;
            }
            .theme-toggle {
                top: 15px;
                left: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <button id="theme-toggle" class="theme-toggle" title="تغییر تم">
        <svg id="icon-sun" viewBox="0 0 24 24" style="display: none;">
            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
        <svg id="icon-moon" viewBox="0 0 24 24" style="display: none;">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
    </button>

    <h1>⚡ محاسبه تغییرات درصد · صندوق سینرژی (نفت، گاز، برق)</h1>

    <div class="calculator-section">
        <h2>محاسبه تفاوت درصد</h2>

        <div class="input-group">
            <label for="sinergy_number1">عدد پایه (با کاما):</label>
            <div class="input-wrapper">
                <input type="text" id="sinergy_number1" placeholder="مثال: 1,000,000">
                <button class="copy-btn tooltip" onclick="copyFieldValue('sinergy_number1')" title="کپی">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
        </div>

        <div class="input-group">
            <label for="sinergy_number2">عدد جدید (با کاما):</label>
            <div class="input-wrapper">
                <input type="text" id="sinergy_number2" placeholder="مثال: 500,000">
                <button class="copy-btn tooltip" onclick="copyFieldValue('sinergy_number2')" title="کپی">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
        </div>

        <button id="sinergy_calculateDifference" class="calc-btn">✨ محاسبه و ذخیره در تاریخچه</button>

        <div class="result-container">
            <div class="result" id="sinergy_differenceResult"></div>
            <button class="copy-btn tooltip" onclick="copyResult()" title="کپی نتیجه" id="resultCopyBtn" style="display: none;">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
        </div>
    </div>

    <div class="history-section" id="historySection">
        <div class="history-dropdown">
            <button class="history-btn calc-btn" id="historyToggleBtn">
                📜 نمایش/بستن تاریخچه محاسبات <span class="badge" id="historyCount">0</span> ▼
            </button>
            <div class="dropdown-content" id="historyList">
                <div style="padding: 15px; text-align: center; color: var(--text-secondary);">📭 هنوز محاسبه‌ای انجام نشده</div>
            </div>
        </div>
        <button class="clear-history calc-btn" id="clearHistoryBtn">🗑️ پاک کردن کل تاریخچه</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg">✅ کپی شد!</div>

<script>
    // ========== تم (Dark/Light Mode) ==========
    const themeToggleBtn = document.getElementById('theme-toggle');
    const iconSun = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');
    const htmlElement = document.documentElement;

    function applyTheme(theme) {
        if (theme === 'dark') {
            htmlElement.setAttribute('data-theme', 'dark');
            iconSun.style.display = 'block';
            iconMoon.style.display = 'none';
        } else {
            htmlElement.removeAttribute('data-theme');
            iconSun.style.display = 'none';
            iconMoon.style.display = 'block';
        }
    }

    function initTheme() {
        const savedTheme = localStorage.getItem('sinergy_theme_preference');
        if (savedTheme) {
            applyTheme(savedTheme);
        } else {
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(systemPrefersDark ? 'dark' : 'light');
        }
    }

    themeToggleBtn.addEventListener('click', () => {
        const currentTheme = htmlElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        applyTheme(newTheme);
        localStorage.setItem('sinergy_theme_preference', newTheme);
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
        if (!localStorage.getItem('sinergy_theme_preference')) {
            applyTheme(event.matches ? 'dark' : 'light');
        }
    });

    initTheme();

    // ========== کلیدهای ذخیره‌سازی ==========
    const STORAGE_BASE = 'sinergy_baseNumber';
    const STORAGE_HISTORY = 'sinergy_history';

    // ========== المان‌ها ==========
    const num1Input = document.getElementById('sinergy_number1');
    const num2Input = document.getElementById('sinergy_number2');
    const resultDiv = document.getElementById('sinergy_differenceResult');
    const calcBtn = document.getElementById('sinergy_calculateDifference');
    const historyToggleBtn = document.getElementById('historyToggleBtn');
    const historyListDiv = document.getElementById('historyList');
    const historyCountSpan = document.getElementById('historyCount');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const historySection = document.getElementById('historySection');
    const toastMsg = document.getElementById('toastMsg');
    const resultCopyBtn = document.getElementById('resultCopyBtn');

    // ========== تبدیل اعداد فارسی به انگلیسی ==========
    function convertToEnglishNumbers(input) {
        if (!input && input !== 0) return '';
        const str = String(input);
        const persianNumbers = {
            '۰': '0', '۱': '1', '۲': '2', '۳': '3', '۴': '4',
            '۵': '5', '۶': '6', '۷': '7', '۸': '8', '۹': '9',
            '٠': '0', '١': '1', '٢': '2', '٣': '3', '٤': '4',
            '٥': '5', '٦': '6', '٧': '7', '٨': '8', '٩': '9'
        };
        return str.replace(/[۰-۹٠-٩]/g, (match) => persianNumbers[match] || match);
    }

    function normalizeNumberString(str) {
        if (!str) return '';
        let converted = convertToEnglishNumbers(str);
        converted = converted.replace(/[^0-9,.]/g, '');
        return converted;
    }

    // ========== توابع کمکی ==========
    function showToast(text) {
        toastMsg.textContent = text || '✅ کپی شد!';
        toastMsg.style.opacity = '1';
        setTimeout(() => {
            toastMsg.style.opacity = '0';
        }, 1500);
    }

    function showTooltip(btnElement) {
        if (!btnElement) return;
        btnElement.classList.add('show-tooltip');
        setTimeout(() => {
            btnElement.classList.remove('show-tooltip');
        }, 1500);
    }

    function copyToClipboard(text) {
        if (!text) return;
        const englishText = convertToEnglishNumbers(text);
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(englishText).then(() => {
                showToast(`📋 کپی شد: ${englishText.length > 30 ? englishText.substring(0, 30) + '...' : englishText}`);
            }).catch(() => {
                fallbackCopy(englishText);
            });
        } else {
            fallbackCopy(englishText);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast(`📋 کپی شد`);
    }

    function copyFieldValue(fieldId) {
        const inputElement = document.getElementById(fieldId);
        const textToCopy = inputElement.value;
        if (textToCopy) {
            copyToClipboard(textToCopy);
            const btn = inputElement.nextElementSibling;
            if (btn) showTooltip(btn);
        }
    }

    function copyResult() {
        const textToCopy = resultDiv.textContent;
        if (textToCopy && textToCopy !== '') {
            copyToClipboard(textToCopy);
            showTooltip(resultCopyBtn);
        }
    }

    function formatNumberWithCommas(x) {
        if (x === undefined || x === null || isNaN(x)) return '';
        return Number(x).toLocaleString('en-US');
    }

    function parseNumberWithCommas(str) {
        if (!str || str.trim() === '') return NaN;
        const normalized = normalizeNumberString(str);
        const cleaned = normalized.replace(/,/g, '');
        const num = parseFloat(cleaned);
        return isNaN(num) ? NaN : num;
    }

    function toPersianDate(date) {
        return new Intl.DateTimeFormat('fa-IR', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        }).format(new Date(date));
    }

    // ========== مدیریت تاریخچه ==========
    function getHistory() {
        const raw = localStorage.getItem(STORAGE_HISTORY);
        if (!raw) return [];
        try {
            return JSON.parse(raw);
        } catch(e) {
            return [];
        }
    }

    function saveHistory(history) {
        localStorage.setItem(STORAGE_HISTORY, JSON.stringify(history));
        renderHistory();
    }

    function addToHistory(baseNum, newNum, percent, diffType, rawBase, rawNew) {
        const history = getHistory();
        const now = new Date();
        history.unshift({
            id: Date.now(),
            base: baseNum,
            new: newNum,
            percent: percent,
            type: diffType,
            rawBase: rawBase,
            rawNew: rawNew,
            timestamp: now.toISOString(),
            persianDate: toPersianDate(now)
        });
        if (history.length > 60) history.pop();
        saveHistory(history);
    }

    function getRawBaseFromHistoryItem(item) {
        if (item.rawBase !== undefined && item.rawBase !== null && !isNaN(item.rawBase)) {
            return item.rawBase;
        }
        if (item.base) return parseNumberWithCommas(item.base);
        return NaN;
    }

    function getRawNewFromHistoryItem(item) {
        if (item.rawNew !== undefined && item.rawNew !== null && !isNaN(item.rawNew)) {
            return item.rawNew;
        }
        if (item.new) return parseNumberWithCommas(item.new);
        return NaN;
    }

    function renderHistory() {
        const history = getHistory();
        historyCountSpan.innerText = history.length;

        if (history.length === 0) {
            historyListDiv.innerHTML = '<div style="padding: 15px; text-align: center; color: var(--text-secondary);">📭 هیچ محاسبه‌ای توی تاریخچه نیست</div>';
            return;
        }

        historyListDiv.innerHTML = history.map(item => {
            const percentNum = parseFloat(item.percent);
            const percentColor = percentNum > 0 ? 'var(--positive-color)' : (percentNum < 0 ? 'var(--negative-color)' : 'var(--neutral-color)');
            const typeText = item.type === 'increase' ? '📈 افزایش' : (item.type === 'decrease' ? '📉 کاهش' : '⚖️ بدون تغییر');
            const baseDisplay = convertToEnglishNumbers(item.base || '???');
            const newDisplay = convertToEnglishNumbers(item.new || '???');
            const percentDisplay = convertToEnglishNumbers(item.percent || '0');
            return `
                <div class="history-item" data-id="${item.id}">
                    <div class="date">📅 ${item.persianDate || toPersianDate(item.timestamp)}</div>
                    <div class="details">
                        <span class="copyable-number" data-copy-type="base" data-value="${baseDisplay}" data-raw="${getRawBaseFromHistoryItem(item)}">${baseDisplay}</span>
                        →
                        <span class="copyable-number" data-copy-type="new" data-value="${newDisplay}" data-raw="${getRawNewFromHistoryItem(item)}">${newDisplay}</span>
                        <span class="copyable-percent" data-copy-type="percent" data-value="${percentDisplay}" style="color: ${percentColor}; font-weight: bold; cursor: pointer;"> (${percentDisplay}%)</span>
                    </div>
                    <div style="font-size: 0.7rem; color: var(--primary-color);" class="copyable-full" data-copy-type="full" data-base="${baseDisplay}" data-new="${newDisplay}" data-percent="${percentDisplay}" data-type="${typeText}">${typeText}</div>
                </div>
            `;
        }).join('');

        attachCopyEvents();

        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('copyable-number') ||
                    e.target.classList.contains('copyable-percent') ||
                    e.target.classList.contains('copyable-full')) {
                    return;
                }
                e.stopPropagation();
                const id = parseInt(el.dataset.id);
                const historyItem = getHistory().find(h => h.id === id);
                if (historyItem) {
                    const rawBase = getRawBaseFromHistoryItem(historyItem);
                    const rawNew = getRawNewFromHistoryItem(historyItem);
                    if (!isNaN(rawBase) && !isNaN(rawNew)) {
                        num1Input.value = formatNumberWithCommas(rawBase);
                        num2Input.value = formatNumberWithCommas(rawNew);
                        calculateAndSave(false);
                    } else {
                        resultDiv.textContent = '⚠️ داده این آیتم تاریخچه ناقص است';
                        resultDiv.className = 'result negative';
                    }
                    historySection.classList.remove('show');
                }
            });
        });
    }

    function attachCopyEvents() {
        const copyElements = document.querySelectorAll('.copyable-number, .copyable-percent, .copyable-full');
        let pressTimer = null;

        copyElements.forEach(el => {
            const startPress = (e) => {
                pressTimer = setTimeout(() => {
                    let copyText = '';
                    const type = el.dataset.copyType;

                    if (type === 'base') {
                        copyText = el.dataset.value || '';
                    } else if (type === 'new') {
                        copyText = el.dataset.value || '';
                    } else if (type === 'percent') {
                        copyText = el.dataset.value || '';
                        copyText = copyText.replace('%', '');
                    } else if (type === 'full') {
                        copyText = `${el.dataset.base} → ${el.dataset.new} | ${el.dataset.percent}% ${el.dataset.type || ''}`;
                    }

                    if (copyText) {
                        copyToClipboard(copyText);
                    }

                    if (navigator.vibrate) navigator.vibrate(50);
                    clearTimeout(pressTimer);
                }, 500);
            };

            const cancelPress = () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
            };

            el.addEventListener('mousedown', startPress);
            el.addEventListener('mouseup', cancelPress);
            el.addEventListener('mouseleave', cancelPress);
            el.addEventListener('touchstart', startPress);
            el.addEventListener('touchend', cancelPress);
            el.addEventListener('touchcancel', cancelPress);
        });
    }

    // ========== محاسبه اصلی ==========
    function calculateAndSave(saveToHistory = true) {
        let baseStr = num1Input.value;
        let newStr = num2Input.value;

        baseStr = normalizeNumberString(baseStr);
        newStr = normalizeNumberString(newStr);

        const baseNum = parseNumberWithCommas(baseStr);
        const newNum = parseNumberWithCommas(newStr);

        if (!isNaN(baseNum) && baseNum.toString() !== 'NaN') {
            num1Input.value = formatNumberWithCommas(baseNum);
        }
        if (!isNaN(newNum) && newNum.toString() !== 'NaN') {
            num2Input.value = formatNumberWithCommas(newNum);
        }

        resultDiv.className = 'result';
        resultCopyBtn.style.display = 'none';

        if (isNaN(baseNum) || isNaN(newNum)) {
            resultDiv.textContent = '❌ لطفاً اعداد معتبر وارد کنید (فقط رقم و کاما)';
            resultDiv.classList.add('negative');
            return false;
        }
        if (baseNum === 0) {
            resultDiv.textContent = '⚠️ عدد پایه نمی‌تواند صفر باشد!';
            resultDiv.classList.add('negative');
            return false;
        }

        const diff = newNum - baseNum;
        const percent = (diff / baseNum) * 100;
        let percentFixed = percent.toFixed(2);
        let type = 'neutral';
        let resultText = `📊 تغییرات درصد (سینرژی): ${percentFixed}%`;

        if (percent > 0) {
            resultText += ' 📈 (افزایش ارزش صندوق)';
            type = 'increase';
            resultDiv.classList.add('positive');
        } else if (percent < 0) {
            resultText += ' 📉 (کاهش ارزش صندوق)';
            type = 'decrease';
            resultDiv.classList.add('negative');
        } else {
            resultText += ' ⚖️ (بدون تغییر)';
            type = 'neutral';
            resultDiv.classList.add('neutral');
        }

        const changeAmount = Math.abs((percent/100) * baseNum);
        if (percent > 0) {
            resultText += ` — 🎉 یعنی ${formatNumberWithCommas(Math.round(changeAmount))} تومان افزایش سرمایه!`;
        } else if (percent < 0) {
            resultText += ` — 😢 یعنی ${formatNumberWithCommas(Math.round(changeAmount))} تومان کاهش سرمایه!`;
        }

        resultDiv.textContent = resultText;
        resultCopyBtn.style.display = 'flex';

        if (saveToHistory) {
            addToHistory(
                formatNumberWithCommas(baseNum),
                formatNumberWithCommas(newNum),
                percentFixed,
                type,
                baseNum,
                newNum
            );
        }
        return true;
    }

    // ========== رویدادها ==========
    function handleNumberInput(e) {
        let val = e.target.value;
        const converted = normalizeNumberString(val);
        const num = parseNumberWithCommas(converted);
        if (!isNaN(num)) {
            e.target.value = formatNumberWithCommas(num);
        } else if (converted === '') {
            e.target.value = '';
        } else {
            e.target.value = converted;
        }

        if (e.target.id === 'sinergy_number1') {
            localStorage.setItem(STORAGE_BASE, e.target.value);
        }

        if (resultDiv.textContent !== '') {
            resultDiv.textContent = '';
            resultDiv.className = 'result';
            resultCopyBtn.style.display = 'none';
        }
    }

    num1Input.addEventListener('input', handleNumberInput);
    num2Input.addEventListener('input', handleNumberInput);

    document.addEventListener('DOMContentLoaded', () => {
        const savedBase = localStorage.getItem(STORAGE_BASE);
        if (savedBase) {
            const converted = normalizeNumberString(savedBase);
            const num = parseNumberWithCommas(converted);
            if (!isNaN(num)) {
                num1Input.value = formatNumberWithCommas(num);
            }
        }
        renderHistory();
        num1Input.focus();
    });

    calcBtn.addEventListener('click', () => calculateAndSave(true));

    clearHistoryBtn.addEventListener('click', () => {
        if (confirm('❗ همه تاریخچه صندوق سینرژی پاک می‌شه! مطمئنی؟')) {
            localStorage.removeItem(STORAGE_HISTORY);
            renderHistory();
            resultDiv.textContent = '🧹 تاریخچه با موفقیت پاک شد';
            resultDiv.className = 'result neutral';
            resultCopyBtn.style.display = 'flex';
            setTimeout(() => {
                if(resultDiv.textContent === '🧹 تاریخچه با موفقیت پاک شد') {
                    resultDiv.textContent = '';
                    resultDiv.className = 'result';
                    resultCopyBtn.style.display = 'none';
                }
            }, 2000);
        }
    });

    historyToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        historySection.classList.toggle('show');
    });

    document.addEventListener('click', function(e) {
        if (!historySection.contains(e.target)) {
            historySection.classList.remove('show');
        }
    });

    const handleEnter = (e) => { if (e.key === 'Enter') calculateAndSave(true); };
    num1Input.addEventListener('keypress', handleEnter);
    num2Input.addEventListener('keypress', handleEnter);

    // توابع global برای دکمه‌های کپی (برای onclick در html)
    window.copyFieldValue = copyFieldValue;
    window.copyResult = copyResult;
</script>
</body>
</html>
