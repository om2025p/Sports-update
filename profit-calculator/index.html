<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="../cloud-sync.js"></script>
    <title>محاسبه گر سود</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --active-bg: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #020617 100%);
            color: var(--text-color);
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .tabs {
            display: flex;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 10px 10px 0 10px;
            gap: 8px;
            z-index: 100;
        }

        .tab {
            flex: 1;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 15px 15px 0 0;
            border: 1px solid transparent;
            border-bottom: none;
            color: rgba(255, 255, 255, 0.7);
            position: relative;
        }

        .tab.active {
            background: var(--active-bg);
            color: #ffffff;
            border-color: var(--glass-border);
            opacity: 1;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #00c853;
            border-radius: 3px 3px 0 0;
        }

        .tab-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: none;
            border: none;
        }

        .tab-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">📈 محاسبه ۱</div>
            <div class="tab" onclick="switchTab(1)">📊 محاسبه ۲</div>
        </div>
        <div class="tab-container">
            <div id="content0" class="tab-content active">
                <iframe src="calc1.html"></iframe>
            </div>
            <div id="content1" class="tab-content">
                <iframe src="calc2.html"></iframe>
            </div>
        </div>
    </div>

    <script>
        function switchTab(index) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.tab-content').forEach((c, i) => {
                c.classList.toggle('active', i === index);
            });
        }

        // سرویس ورکر اکنون به صورت مرکزی از منوی اصلی مدیریت می‌شود
    </script>
</body>
</html>
