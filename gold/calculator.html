<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ماشین حساب تغییرات درصد طلا | حرفه‌ای آفلاین</title>
    <style>
        body {
            font-family: Tahoma, 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #2d2d2d;
            border-radius: 28px;
            box-shadow: 0 12px 32px rgba(255, 215, 0, 0.2);
            padding: 25px;
            width: 95%;
            max-width: 720px;
        }

        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .calculator-section {
            background: #383838;
            border: 1px solid #555;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }

        h2 {
            color: #f1c40f;
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #cccccc;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #555;
            border-radius: 14px;
            font-size: 1em;
            font-family: monospace;
            box-sizing: border-box;
            transition: all 0.2s;
            background: #444;
            color: #f0f0f0;
            direction: ltr;
            text-align: left;
        }

        input[type="text"]:focus {
            border-color: #ffd700;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.3);
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        button {
            background-color: #f1c40f;
            color: #1a1a1a;
            padding: 10px 18px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
            margin: 5px 5px 0 0;
        }

        button:hover {
            background-color: #d4ac0d;
            transform: scale(1.02);
        }

        .result {
            margin-top: 15px;
            padding: 14px;
            border-radius: 16px;
            font-weight: 500;
            text-align: center;
            font-size: 1rem;
        }

        .positive { background: #1a3a2a; color: #2ecc71; border-right: 4px solid #2ecc71; }
        .negative { background: #3a1a1a; color: #e74c3c; border-right: 4px solid #e74c3c; }
        .neutral { background: #2a2a3a; color: #3498db; border-right: 4px solid #3498db; }

        .history-section {
            position: relative;
        }

        .history-dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .history-btn {
            background-color: #f39c12;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1a1a1a;
        }

        .history-btn:hover {
            background-color: #e67e22;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #3a3a3a;
            min-width: 100%;
            max-height: 380px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border-radius: 18px;
            z-index: 1000;
            margin-top: 10px;
            border: 1px solid #ffd700;
        }

        .history-section.show .dropdown-content {
            display: block;
        }

        .history-item {
            padding: 14px;
            border-bottom: 1px solid #555;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .history-item:hover {
            background-color: #4a4a4a;
        }

        .history-item .copyable-number,
        .history-item .copyable-percent,
        .history-item .copyable-full {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 12px;
            transition: background 0.1s;
        }

        .history-item .copyable-number:active,
        .history-item .copyable-percent:active {
            background-color: #ffd700;
            color: #1a1a1a;
            transform: scale(0.98);
        }

        .history-item .date {
            color: #ffd700;
            font-size: 0.7rem;
            direction: ltr;
            display: inline-block;
            background: #2a2a2a;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 6px;
        }

        .history-item .details {
            font-weight: 600;
            color: #f1c40f;
            font-size: 0.9rem;
            margin: 5px 0;
            direction: ltr;
            text-align: left;
        }

        .clear-history {
            background-color: #c0392b;
            margin-top: 12px;
            width: 100%;
        }

        .clear-history:hover {
            background-color: #a93226;
        }

        .badge {
            background: #e67e22;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.7rem;
            margin-right: 8px;
            color: #1a1a1a;
            font-weight: bold;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffd700;
            color: #1a1a1a;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            font-weight: bold;
        }

        .dropdown-content::-webkit-scrollbar {
            width: 6px;
        }
        .dropdown-content::-webkit-scrollbar-track {
            background: #2a2a2a;
            border-radius: 10px;
        }
        .dropdown-content::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            .history-item .details { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 ماشین حساب تغییرات درصد طلا <span style="font-size: 0.7rem;">🔢 اعداد انگلیسی</span></h1>

    <div class="calculator-section">
        <h2>📊 محاسبه تفاوت درصد</h2>
        <div class="input-group">
            <label>🔢 عدد پایه طلا (با کاما):</label>
            <input type="text" id="gold_number1" placeholder="مثال: 1,000,000">
        </div>
        <div class="input-group">
            <label>🆕 عدد جدید طلا (با کاما):</label>
            <input type="text" id="gold_number2" placeholder="مثال: 500,000">
        </div>
        <button id="gold_calculateDifference">✨ محاسبه و ذخیره در تاریخچه</button>
        <div class="result" id="gold_differenceResult"></div>
    </div>

    <div class="history-section" id="historySection">
        <div class="history-dropdown">
            <button class="history-btn" id="historyToggleBtn">
                📜 نمایش/بستن تاریخچه محاسبات طلا <span class="badge" id="historyCount">0</span> ▼
            </button>
            <div class="dropdown-content" id="historyList">
                <div style="padding: 15px; text-align: center; color: #888;">📭 هنوز محاسبه‌ای انجام نشده</div>
            </div>
        </div>
        <button class="clear-history" id="clearHistoryBtn">🗑️ پاک کردن کل تاریخچه طلا</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg">✅ کپی شد!</div>

<script>
    // کلیدهای ذخیره‌سازی (با پیشوند gold برای تفکیک از فایل قبلی)
    const STORAGE_BASE = 'gold_baseNumber';
    const STORAGE_HISTORY = 'gold_history';

    // المان‌ها
    const num1Input = document.getElementById('gold_number1');
    const num2Input = document.getElementById('gold_number2');
    const resultDiv = document.getElementById('gold_differenceResult');
    const calcBtn = document.getElementById('gold_calculateDifference');
    const historyToggleBtn = document.getElementById('historyToggleBtn');
    const historyListDiv = document.getElementById('historyList');
    const historyCountSpan = document.getElementById('historyCount');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const historySection = document.getElementById('historySection');
    const toastMsg = document.getElementById('toastMsg');

    // ========== تبدیل اعداد فارسی/عربی به انگلیسی ==========
    function convertToEnglishNumbers(input) {
        if (!input && input !== 0) return '';
        const str = String(input);
        const persianNumbers = {
            '۰': '0', '۱': '1', '۲': '2', '۳': '3', '۴': '4',
            '۵': '5', '۶': '6', '۷': '7', '۸': '8', '۹': '9',
            '٠': '0', '١': '1', '٢': '2', '٣': '3', '٤': '4',
            '٥': '5', '٦': '6', '٧': '7', '٨': '8', '٩': '9'
        };
        return str.replace(/[۰-۹٠-٩]/g, (match) => persianNumbers[match] || match);
    }

    function normalizeNumberString(str) {
        if (!str) return '';
        let converted = convertToEnglishNumbers(str);
        converted = converted.replace(/[^0-9,.]/g, '');
        return converted;
    }

    // ========== توابع کمکی ==========
    function showToast(text) {
        toastMsg.textContent = text || '✅ کپی شد!';
        toastMsg.style.opacity = '1';
        setTimeout(() => {
            toastMsg.style.opacity = '0';
        }, 1500);
    }

    function copyToClipboard(text) {
        if (!text) return;
        const englishText = convertToEnglishNumbers(text);
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(englishText).then(() => {
                showToast(`📋 کپی شد: ${englishText.length > 30 ? englishText.substring(0, 30) + '...' : englishText}`);
            }).catch(() => {
                fallbackCopy(englishText);
            });
        } else {
            fallbackCopy(englishText);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast(`📋 کپی شد: ${text.length > 30 ? text.substring(0, 30) + '...' : text}`);
    }

    function formatNumberWithCommas(x) {
        if (x === undefined || x === null || isNaN(x)) return '';
        return Number(x).toLocaleString('en-US');
    }

    function parseNumberWithCommas(str) {
        if (!str || str.trim() === '') return NaN;
        const normalized = normalizeNumberString(str);
        const cleaned = normalized.replace(/,/g, '');
        const num = parseFloat(cleaned);
        return isNaN(num) ? NaN : num;
    }

    function toPersianDate(date) {
        return new Intl.DateTimeFormat('fa-IR', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        }).format(new Date(date));
    }

    // ========== مدیریت تاریخچه ==========
    function getHistory() {
        const raw = localStorage.getItem(STORAGE_HISTORY);
        if (!raw) return [];
        try {
            return JSON.parse(raw);
        } catch(e) {
            return [];
        }
    }

    function saveHistory(history) {
        localStorage.setItem(STORAGE_HISTORY, JSON.stringify(history));
        renderHistory();
    }

    function addToHistory(baseNum, newNum, percent, diffType, rawBase, rawNew) {
        const history = getHistory();
        const now = new Date();
        history.unshift({
            id: Date.now(),
            base: baseNum,
            new: newNum,
            percent: percent,
            type: diffType,
            rawBase: rawBase,
            rawNew: rawNew,
            timestamp: now.toISOString(),
            persianDate: toPersianDate(now)
        });
        if (history.length > 60) history.pop();
        saveHistory(history);
    }

    function getRawBaseFromHistoryItem(item) {
        if (item.rawBase !== undefined && item.rawBase !== null && !isNaN(item.rawBase)) {
            return item.rawBase;
        }
        if (item.base) return parseNumberWithCommas(item.base);
        return NaN;
    }

    function getRawNewFromHistoryItem(item) {
        if (item.rawNew !== undefined && item.rawNew !== null && !isNaN(item.rawNew)) {
            return item.rawNew;
        }
        if (item.new) return parseNumberWithCommas(item.new);
        return NaN;
    }

    function renderHistory() {
        const history = getHistory();
        historyCountSpan.innerText = history.length;

        if (history.length === 0) {
            historyListDiv.innerHTML = '<div style="padding: 15px; text-align: center; color: #888;">📭 هیچ محاسبه‌ای توی تاریخچه نیست</div>';
            return;
        }

        historyListDiv.innerHTML = history.map(item => {
            const percentNum = parseFloat(item.percent);
            const percentColor = percentNum > 0 ? '#2ecc71' : (percentNum < 0 ? '#e74c3c' : '#3498db');
            const typeText = item.type === 'increase' ? '📈 افزایش' : (item.type === 'decrease' ? '📉 کاهش' : '⚖️ بدون تغییر');
            const baseDisplay = convertToEnglishNumbers(item.base || '???');
            const newDisplay = convertToEnglishNumbers(item.new || '???');
            const percentDisplay = convertToEnglishNumbers(item.percent || '0');
            return `
                <div class="history-item" data-id="${item.id}">
                    <div class="date">📅 ${item.persianDate || toPersianDate(item.timestamp)}</div>
                    <div class="details">
                        <span class="copyable-number" data-copy-type="base" data-value="${baseDisplay}" data-raw="${getRawBaseFromHistoryItem(item)}">${baseDisplay}</span>
                        →
                        <span class="copyable-number" data-copy-type="new" data-value="${newDisplay}" data-raw="${getRawNewFromHistoryItem(item)}">${newDisplay}</span>
                        <span class="copyable-percent" data-copy-type="percent" data-value="${percentDisplay}" style="color: ${percentColor}; font-weight: bold; cursor: pointer;"> (${percentDisplay}%)</span>
                    </div>
                    <div style="font-size: 0.7rem; color: #ffd700;" class="copyable-full" data-copy-type="full" data-base="${baseDisplay}" data-new="${newDisplay}" data-percent="${percentDisplay}" data-type="${typeText}">${typeText}</div>
                </div>
            `;
        }).join('');

        attachCopyEvents();

        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('copyable-number') ||
                    e.target.classList.contains('copyable-percent') ||
                    e.target.classList.contains('copyable-full')) {
                    return;
                }
                e.stopPropagation();
                const id = parseInt(el.dataset.id);
                const historyItem = getHistory().find(h => h.id === id);
                if (historyItem) {
                    const rawBase = getRawBaseFromHistoryItem(historyItem);
                    const rawNew = getRawNewFromHistoryItem(historyItem);
                    if (!isNaN(rawBase) && !isNaN(rawNew)) {
                        num1Input.value = formatNumberWithCommas(rawBase);
                        num2Input.value = formatNumberWithCommas(rawNew);
                        calculateAndSave(false);
                    } else {
                        resultDiv.textContent = '⚠️ داده این آیتم تاریخچه ناقص است';
                        resultDiv.className = 'result negative';
                    }
                    historySection.classList.remove('show');
                }
            });
        });
    }

    function attachCopyEvents() {
        const copyElements = document.querySelectorAll('.copyable-number, .copyable-percent, .copyable-full');
        let pressTimer = null;

        copyElements.forEach(el => {
            const startPress = (e) => {
                pressTimer = setTimeout(() => {
                    let copyText = '';
                    const type = el.dataset.copyType;

                    if (type === 'base') {
                        copyText = el.dataset.value || '';
                    } else if (type === 'new') {
                        copyText = el.dataset.value || '';
                    } else if (type === 'percent') {
                        copyText = el.dataset.value || '';
                        copyText = copyText.replace('%', '');
                    } else if (type === 'full') {
                        copyText = `${el.dataset.base} → ${el.dataset.new} | ${el.dataset.percent}% ${el.dataset.type || ''}`;
                    }

                    if (copyText) {
                        copyToClipboard(copyText);
                    }

                    if (navigator.vibrate) navigator.vibrate(50);
                    clearTimeout(pressTimer);
                }, 500);
            };

            const cancelPress = () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
            };

            el.addEventListener('mousedown', startPress);
            el.addEventListener('mouseup', cancelPress);
            el.addEventListener('mouseleave', cancelPress);
            el.addEventListener('touchstart', startPress);
            el.addEventListener('touchend', cancelPress);
            el.addEventListener('touchcancel', cancelPress);
        });
    }

    // ========== محاسبه اصلی ==========
    function calculateAndSave(saveToHistory = true) {
        let baseStr = num1Input.value;
        let newStr = num2Input.value;

        baseStr = normalizeNumberString(baseStr);
        newStr = normalizeNumberString(newStr);

        const baseNum = parseNumberWithCommas(baseStr);
        const newNum = parseNumberWithCommas(newStr);

        if (!isNaN(baseNum) && baseNum.toString() !== 'NaN') {
            num1Input.value = formatNumberWithCommas(baseNum);
        }
        if (!isNaN(newNum) && newNum.toString() !== 'NaN') {
            num2Input.value = formatNumberWithCommas(newNum);
        }

        resultDiv.className = 'result';

        if (isNaN(baseNum) || isNaN(newNum)) {
            resultDiv.textContent = '❌ لطفاً اعداد معتبر وارد کنید (فقط رقم و کاما)';
            resultDiv.classList.add('negative');
            return false;
        }
        if (baseNum === 0) {
            resultDiv.textContent = '⚠️ عدد پایه نمی‌تواند صفر باشد!';
            resultDiv.classList.add('negative');
            return false;
        }

        const diff = newNum - baseNum;
        const percent = (diff / baseNum) * 100;
        let percentFixed = percent.toFixed(2);
        let type = 'neutral';
        let resultText = `📊 تغییرات درصد طلا: ${percentFixed}%`;

        if (percent > 0) {
            resultText += ' 📈 (افزایش قیمت طلا)';
            type = 'increase';
            resultDiv.classList.add('positive');
        } else if (percent < 0) {
            resultText += ' 📉 (کاهش قیمت طلا)';
            type = 'decrease';
            resultDiv.classList.add('negative');
        } else {
            resultText += ' ⚖️ (بدون تغییر)';
            type = 'neutral';
            resultDiv.classList.add('neutral');
        }

        const changeAmount = Math.abs((percent/100) * baseNum);
        if (percent > 0) {
            resultText += ` — 🎉 یعنی ${formatNumberWithCommas(Math.round(changeAmount))} تومان گرون تر شدی!`;
        } else if (percent < 0) {
            resultText += ` — 😢 یعنی ${formatNumberWithCommas(Math.round(changeAmount))} تومان ارزون تر شدی!`;
        }

        resultDiv.textContent = resultText;

        if (saveToHistory) {
            addToHistory(
                formatNumberWithCommas(baseNum),
                formatNumberWithCommas(newNum),
                percentFixed,
                type,
                baseNum,
                newNum
            );
        }
        return true;
    }

    // ========== رویدادها با تبدیل خودکار ==========
    function handleNumberInput(e) {
        let val = e.target.value;
        const converted = normalizeNumberString(val);
        const num = parseNumberWithCommas(converted);
        if (!isNaN(num)) {
            e.target.value = formatNumberWithCommas(num);
        } else if (converted === '') {
            e.target.value = '';
        } else {
            e.target.value = converted;
        }

        if (e.target.id === 'gold_number1') {
            localStorage.setItem(STORAGE_BASE, e.target.value);
        }

        if (resultDiv.textContent !== '') {
            resultDiv.textContent = '';
            resultDiv.className = 'result';
        }
    }

    num1Input.addEventListener('input', handleNumberInput);
    num2Input.addEventListener('input', handleNumberInput);

    document.addEventListener('DOMContentLoaded', () => {
        const savedBase = localStorage.getItem(STORAGE_BASE);
        if (savedBase) {
            const converted = normalizeNumberString(savedBase);
            const num = parseNumberWithCommas(converted);
            if (!isNaN(num)) {
                num1Input.value = formatNumberWithCommas(num);
            }
        }
        renderHistory();
        num1Input.focus();
    });

    calcBtn.addEventListener('click', () => calculateAndSave(true));

    clearHistoryBtn.addEventListener('click', () => {
        if (confirm('❗ همه تاریخچه طلا پاک می‌شه! مطمئنی؟')) {
            localStorage.removeItem(STORAGE_HISTORY);
            renderHistory();
            resultDiv.textContent = '🧹 تاریخچه طلا با موفقیت پاک شد';
            resultDiv.className = 'result neutral';
            setTimeout(() => {
                if(resultDiv.textContent === '🧹 تاریخچه طلا با موفقیت پاک شد') {
                    resultDiv.textContent = '';
                    resultDiv.className = 'result';
                }
            }, 2000);
        }
    });

    historyToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        historySection.classList.toggle('show');
    });

    document.addEventListener('click', function(e) {
        if (!historySection.contains(e.target)) {
            historySection.classList.remove('show');
        }
    });

    const handleEnter = (e) => { if (e.key === 'Enter') calculateAndSave(true); };
    num1Input.addEventListener('keypress', handleEnter);
    num2Input.addEventListener('keypress', handleEnter);
</script>
</body>
</html>
